name: CI

on:
  push:
  pull_request:

jobs:
  frontend:
    name: Frontend lint and build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # rolldown-vite requires Node ^20.19.0 or >=22.12.0.
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build -- --configLoader native

  backend:
    name: Backend import and schema check
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: ai_resume_analyzer_ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12

    env:
      DATABASE_URL: mysql+pymysql://root:root@127.0.0.1:3306/ai_resume_analyzer_ci
      SECRET_KEY: ci-secret-key
      DISABLE_DOTENV: "1"
      EMBEDDINGS_ENABLED: "0"
      AI_TIMEOUT_S: "1"
      AI_MAX_RETRIES: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Wait for MySQL
        run: |
          python -B - <<'PY'
          import os
          import time
          from sqlalchemy import create_engine, text

          engine = create_engine(os.environ["DATABASE_URL"], pool_pre_ping=True)
          last_error = None

          for attempt in range(1, 31):
              try:
                  with engine.connect() as conn:
                      conn.execute(text("SELECT 1"))
                  print(f"MySQL is ready on attempt {attempt}.")
                  break
              except Exception as exc:
                  last_error = exc
                  print(f"MySQL not ready yet (attempt {attempt}/30): {exc}")
                  time.sleep(2)
          else:
              raise SystemExit(f"MySQL did not become ready in time: {last_error}")
          PY

      - name: Verify backend imports and MySQL schema
        run: |
          python -B - <<'PY'
          from backend.app.database import init_db
          from backend.app.main import app

          init_db()
          print(app.title)
          PY
