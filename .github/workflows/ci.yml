name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: ai_resume_analyzer_ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Wait for MySQL
        env:
          DATABASE_URL: mysql+pymysql://root:root@127.0.0.1:3306/ai_resume_analyzer_ci
          DISABLE_DOTENV: "1"
        run: |
          python - <<'PY'
          import time
          from sqlalchemy import create_engine, text

          url = "mysql+pymysql://root:root@127.0.0.1:3306/ai_resume_analyzer_ci"
          engine = create_engine(url, pool_pre_ping=True)

          last_error = None
          for attempt in range(1, 31):
              try:
                  with engine.connect() as conn:
                      conn.execute(text("SELECT 1"))
                  print(f"MySQL is ready on attempt {attempt}.")
                  break
              except Exception as exc:
                  last_error = exc
                  print(f"MySQL not ready yet (attempt {attempt}/30): {exc}")
                  time.sleep(2)
          else:
              raise SystemExit(f"MySQL did not become ready in time: {last_error}")
          PY

      - name: Verify backend imports and MySQL schema
        env:
          DATABASE_URL: mysql+pymysql://root:root@127.0.0.1:3306/ai_resume_analyzer_ci
          SECRET_KEY: ci-secret-key
          DISABLE_DOTENV: "1"
        run: |
          python -c "from backend.app.database import init_db; init_db(); from backend.app.main import app; print(app.title)"
